spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/jobtracker
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

    flyway:
      enabled: true
      locations: classpath:db/migration

jwt:
  secret: my-super-secret-key-that-is-at-least-32-characters-long
  expiration: 86400000


server:
  port: 8080